<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sunflower Project</title>
    <style>
    /* 1. Global Reset: Removes default browser "noise" */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden; /* Prevents accidental scrolling on mobile */
        background-color: #000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #container {
        position: relative;
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* dvh = Dynamic Viewport Height (fixes mobile address bar issues) */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* ESSENTIAL: Fills the screen while maintaining ratio */
        z-index: 1;
    }

    /* 2. Hint Text Optimization */
    #hint {
        position: absolute;
        bottom: 15%; /* Positioned relative to the bottom for thumb-reach */
        left: 50%;
        transform: translateX(-50%);
        color: white;
        background: rgba(0, 0, 0, 0.7);
        padding: 12px 24px;
        border-radius: 50px; /* Pill shape */
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s ease;
        z-index: 50;
        text-align: center;
        width: max-content;
        max-width: 80%;
        font-size: clamp(1rem, 4vw, 1.2rem); /* Fluid typography based on screen size */
    }

    /* 3. Overlay Optimization */
    #start-screen {
        position: absolute;
        inset: 0; /* Sets top, right, bottom, and left to 0 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        color: #FFB05B;
        z-index: 100;
        cursor: pointer;
        transition: opacity 0.8s ease;
    }

    #start-screen h1 {
        font-size: clamp(1.5rem, 8vw, 3rem); /* Dynamically scales text for mobile/laptop */
        text-align: center;
        padding: 20px;
        line-height: 1.4;
    }
</style>
</head>
<body>

<div id="container">
    <video id="mainVideo" playsinline>
        <source src="Final_1.mp4" type="video/mp4">
    </video>

    <audio id="starSound">
        <source src="star_sound.mp3" type="audio/mpeg">
    </audio>

    <div id="hint">Touch the star to continue</div>

    <div id="start-screen">
    <h1><center>Touch to Begin</center><br>Experience</h1>
    
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const sound = document.getElementById('starSound');
    const hint = document.getElementById('hint');
    const startScreen = document.getElementById('start-screen');


// INITIAL START LOGIC
    startScreen.addEventListener('click', () => {
    // 1. Hide the start screen
    startScreen.style.opacity = "0";
    setTimeout(() => {
        startScreen.style.display = "none";
    }, 800); // Waits for the fade-out to finish

    // 2. Play the video
    video.play();
});

    // --- USER CONFIGURATION ---
    const pauseTime = 1.3 ; // Set this to your star's arrival time
    let hasPaused = false; 

    // 1. MASTER CLICK HANDLER
    document.body.addEventListener('click', () => {
        
        // REPLAY LOGIC: If the video reached the end
        if (video.ended) {
            video.currentTime = 0; // Move back to the first frame
            hasPaused = false;     // RE-ARM the pause logic for the new run
            video.play();
            hint.style.opacity = "0";
            return;
        }

        // INITIAL START: If the video hasn't played at all yet
        if (video.paused && !hasPaused) {
            video.play();
            return;
        }

        // RESUME LOGIC: If the video is waiting at the Star
        if (hasPaused && video.paused) {
            video.play();
            hint.style.opacity = "0";
        }
    });

    // 2. THE SIMULTANEOUS PAUSE CHECK
    // This runs constantly while the video plays
    video.addEventListener('timeupdate', () => {
        // If the logic is 'armed' (hasPaused is false) and we hit the time:
        if (!hasPaused && video.currentTime >= pauseTime) {
            video.pause();
            sound.play(); // Play your star sound
            hint.innerText = "Touch the star to continue";
            hint.style.opacity = "1";
            
            // 'Tripping' the circuit breaker so it doesn't pause again 
            // until the video is restarted
            hasPaused = true; 
        }
    });

    // 3. THE END STATE
    video.addEventListener('ended', () => {
        hint.innerText = "Replay Animation";
        hint.style.opacity = "1";
    });
</script>


</body>
</html>
