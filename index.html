<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sunflower Project</title>
    <style>
        /* Mobile-friendly full-screen layout */
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #000; font-family: sans-serif;
        }

        #container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        video {
            max-width: 100%; max-height: 100%;
            cursor: pointer; /* Shows the user they can click */
        }

        /* The "Instruction" text that appears when paused */
        #hint {
            position: absolute; bottom: 10%; color: white;
            background: rgba(0,0,0,0.6); padding: 10px 20px;
            border-radius: 20px; pointer-events: none;
            opacity: 0; transition: opacity 0.5s;
        }

        #start-screen {
        position: absolute;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.8); /* Dark background */
        backdrop-filter: blur(8px);    /* Professional blur effect */
        color: #FFB05B;               /* Matching your sunflower/sunset orange */
        z-index: 10;                  /* Ensures it stays on top */
        cursor: pointer;
        transition: opacity 0.8s ease; /* Smooth fade-out */
         }

        #start-screen h1 {
        font-size: 2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        }


    </style>
</head>
<body>

<div id="container">
    <video id="mainVideo" playsinline>
        <source src="Testing.mp4" type="video/mp4">
    </video>

    <audio id="starSound">
        <source src="star_sound.mp3" type="audio/mpeg">
    </audio>

    <div id="hint">Touch the star to continue</div>

    <div id="start-screen">
    <h1><center>Touch to Begin</center><br>Experience</h1>
    
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const sound = document.getElementById('starSound');
    const hint = document.getElementById('hint');
    const startScreen = document.getElementById('start-screen');


// INITIAL START LOGIC
    startScreen.addEventListener('click', () => {
    // 1. Hide the start screen
    startScreen.style.opacity = "0";
    setTimeout(() => {
        startScreen.style.display = "none";
    }, 800); // Waits for the fade-out to finish

    // 2. Play the video
    video.play();
});

    // --- USER CONFIGURATION ---
    const pauseTime = 1.3 ; // Set this to your star's arrival time
    let hasPaused = false; 

    // 1. MASTER CLICK HANDLER
    document.body.addEventListener('click', () => {
        
        // REPLAY LOGIC: If the video reached the end
        if (video.ended) {
            video.currentTime = 0; // Move back to the first frame
            hasPaused = false;     // RE-ARM the pause logic for the new run
            video.play();
            hint.style.opacity = "0";
            return;
        }

        // INITIAL START: If the video hasn't played at all yet
        if (video.paused && !hasPaused) {
            video.play();
            return;
        }

        // RESUME LOGIC: If the video is waiting at the Star
        if (hasPaused && video.paused) {
            video.play();
            hint.style.opacity = "0";
        }
    });

    // 2. THE SIMULTANEOUS PAUSE CHECK
    // This runs constantly while the video plays
    video.addEventListener('timeupdate', () => {
        // If the logic is 'armed' (hasPaused is false) and we hit the time:
        if (!hasPaused && video.currentTime >= pauseTime) {
            video.pause();
            sound.play(); // Play your star sound
            hint.innerText = "Touch the star to continue";
            hint.style.opacity = "1";
            
            // 'Tripping' the circuit breaker so it doesn't pause again 
            // until the video is restarted
            hasPaused = true; 
        }
    });

    // 3. THE END STATE
    video.addEventListener('ended', () => {
        hint.innerText = "Replay Animation";
        hint.style.opacity = "1";
    });
</script>


</body>
</html>
