<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sunflower Project</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #000; font-family: sans-serif;
        }

        #container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* FORCE THE VIDEO TO BE VISIBLE */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This makes it look like a cinematic full-screen shot */
            display: block;
            background: #000;
        }

        #hint {
            position: absolute; bottom: 10%; color: white;
            background: rgba(0,0,0,0.6); padding: 10px 20px;
            border-radius: 20px; pointer-events: none;
            opacity: 0; z-index: 5; transition: opacity 0.5s;
        }

        #start-screen {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: #FFB05B;
            z-index: 100; /* Ensure it is on top of EVERYTHING */
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #start-screen h1 {
            font-size: 2.5rem; letter-spacing: 2px;
            text-transform: uppercase; text-align: center;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="mainVideo" muted playsinline preload="auto">
        <source src= "Testing.mp4" type="video/mp4">
    </video>

    <audio id="starSound">
        <source src= "star_sound.mp3" type="audio/mpeg">
    </audio>

    <div id="hint">Touch the star to continue</div>

    <div id="start-screen">
        <h1>TOUCH TO BEGIN<br>EXPERIENCE</h1>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const sound = document.getElementById('starSound');
    const hint = document.getElementById('hint');
    const startScreen = document.getElementById('start-screen');

    const pauseTime = 1.3; // Your star pause time
    let hasPaused = false; 

    // MASTER CLICK HANDLER
    document.body.addEventListener('click', () => {
        
        // 1. START LOGIC: If the overlay is still visible
        if (startScreen.style.display !== 'none') {
            startScreen.style.opacity = "0";
            setTimeout(() => { startScreen.style.display = "none"; }, 800);
            
            video.muted = false; // UNMUTE the video so your music plays
            video.play().catch(e => console.log("Play error:", e));
            return;
        }

        // 2. REPLAY LOGIC: If the video reached the end
        if (video.ended) {
            video.currentTime = 0;
            hasPaused = false;
            video.play();
            hint.style.opacity = "0";
            return;
        }

        // 3. RESUME LOGIC: If the video is waiting at the Star
        if (hasPaused && video.paused) {
            video.play();
            hint.style.opacity = "0";
        }
    });

    // PAUSE CHECK (Runs while video plays)
    video.addEventListener('timeupdate', () => {
        if (!hasPaused && video.currentTime >= pauseTime) {
            video.pause();
            sound.play(); // Play your star sound effect
            hint.innerText = "Touch the star to continue";
            hint.style.opacity = "1";
            hasPaused = true; 
        }
    });

    // END STATE
    video.addEventListener('ended', () => {
        hint.innerText = "Replay Animation";
        hint.style.opacity = "1";
    });
</script>

</body>
</html>
