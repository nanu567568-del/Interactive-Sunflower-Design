<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sunflower Project</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    
    /* Force video to fill screen so it's not "invisible" */
    video { width: 100%; height: 100%; object-fit: cover; background: #000; }

    #start-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); color: #FFB05B; z-index: 100;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        cursor: pointer; text-align: center;
    }
    video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* This makes it fill the screen like a cinematic shot */
    display: block;
}
</style>

<div id="container">
    <video id="mainVideo" muted playsinline preload="auto">
        <source src="Testing.mp4" type="video/mp4">
    </video>

    <audio id="starSound">
        <source src="star_sound.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h1>TOUCH TO BEGIN<br>EXPERIENCE</h1>
    </div>
</div>
</head>
<body>

<div id="container">
   <video id="mainVideo" muted playsinline preload="auto">
    <source src="Testing.mp4" type="video/mp4">
 </video>

    <audio id="starSound">
        <source src="star_sound.mp3" type="audio/mpeg">
    </audio>

    <div id="hint">Touch the star to continue</div>

    <div id="start-screen">
    <h1><center>Touch to Begin</center><br>Experience</h1>
    
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const starSound = document.getElementById('starSound');
    const startScreen = document.getElementById('start-screen');
    const pauseTime = 4.5; // Change this to your star-stop time
    let hasPaused = false;

    console.log("System Ready: Files linked correctly.");

   startScreen.addEventListener('click', () => {
    console.log("Touch detected! Attempting to play...");
    
    // 1. Hide the overlay
    startScreen.style.opacity = "0";
    setTimeout(() => { startScreen.style.display = "none"; }, 500);

    // 2. THE FIX: Unmute first, then play
    video.muted = false; 
    
    video.play().then(() => {
        console.log("Playback started successfully with audio!");
    }).catch(err => {
        console.error("Playback failed. Error code:", err);
    });
});
    // Handle the Star Pause
    video.addEventListener('timeupdate', () => {
        if (!hasPaused && video.currentTime >= pauseTime) {
            console.log("Star position reached. Pausing video.");
            video.pause();
            starSound.play();
            hasPaused = true;
        }
    });

    // Handle Replay
    video.addEventListener('click', () => {
        if (video.ended) {
            console.log("Restarting animation...");
            video.currentTime = 0;
            hasPaused = false;
            video.play();
        } else if (video.paused && hasPaused) {
            console.log("Resuming from Star pause...");
            video.play();
        }
    });
</script>


</body>
</html>
